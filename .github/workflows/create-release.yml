name: Start a new release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Tag to be created (e.g., 1.2.3 or 2.0.0b4)"
        required: true
        type: string
      latest:
        description: "Mark as latest release (set false for pre-releases or when this is not the main release)"
        required: false
        default: true
        type: boolean

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write # push commits/tags and create releases
      id-token: write # PyPI trusted publishing (OIDC)
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - name: Validate version input
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+[A-Za-z0-9.+-]*$ ]]; then
            echo "Invalid version: '$VERSION'. Expected X.Y.Z optionally followed by letters/digits (e.g., 2.0.0b4)" >&2
            exit 1
          fi
      - name: Check if organization member
        env:
          GH_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          if ! gh api "orgs/Giskard-AI/members/${ACTOR}" --silent 2>/dev/null; then
            echo "::error::${ACTOR} is not a member of the Giskard-AI organization"
            exit 1
          fi

      - name: Generate release token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true
          persist-credentials: false

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          enable-cache: false

      - name: Change version
        run: |
          set -euo pipefail
          uv version "${VERSION}"

      - name: Build release candidate wheel
        run: uv build

      - name: Configure git
        run: |
          git config --global user.name 'BotReleaser'
          git config --global user.email 'bot.releaser@users.noreply.github.com'

      - name: Commit and tag
        run: |
          git add pyproject.toml uv.lock
          git fetch --quiet --tags
          git commit -m "v${VERSION}" --allow-empty
          git tag "v${VERSION}"

      - name: Push branch and tags
        env:
          REF_NAME: ${{ github.ref_name }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${REPO}.git"
          git push origin "${REF_NAME}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          MAKE_LATEST: ${{ inputs.latest }}
        run: |
          set -euo pipefail
          gh release create "v${VERSION}" \
            dist/giskard_hub-*.tar.gz \
            dist/giskard_hub-*.whl \
            --generate-notes \
            --latest="${MAKE_LATEST}"

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
